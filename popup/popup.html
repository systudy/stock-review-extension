<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股每日复盘提醒</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <div class="main-columns">
        <div class="left-col">
          <header class="topbar">
            <div class="title-wrap">
              <h1>收盘复盘助手</h1>
              <p id="headerStatus" class="header-status">复盘未生成 · 自动 15:10 / 16:15</p>
            </div>
            <div class="topbar-actions">
              <button id="openDashboardBtn" class="icon-btn" title="完整面板">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                  <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                </svg>
              </button>
              <button id="refreshBtn" class="icon-btn icon-btn--primary" title="刷新复盘">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
                  <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
                </svg>
              </button>
              <button id="openOptionsBtn" class="icon-btn" title="规则设置">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </button>
            </div>
          </header>

          <section class="panel watch-panel">
            <div class="section-head">
              <h2>自选股</h2>
              <div class="watch-actions">
                <span id="watchCount" class="tiny-meta"></span>
                <button id="sortBtn" class="ghost-btn sort-btn" title="排序">默认</button>
                <button id="openSearchBtn" class="ghost-btn">添加股票</button>
              </div>
            </div>
            <div id="watchlistCards" class="watchlist-cards"></div>
          </section>
        </div>

        <section class="panel detail-panel">
          <div class="detail-drag-bar" id="detailDragBar"></div>
          <div class="detail-head">
            <div>
              <h2 id="selectedTitle">请选择一只股票</h2>
              <p id="selectedMeta" class="tiny-meta">K线、评分和规则命中会在这里一起显示</p>
            </div>
            <div class="detail-head-right">
              <div id="selectedScore" class="score-pill">-- 分</div>
              <button id="closeDetailBtn" class="close-detail-btn" title="关闭">×</button>
            </div>
          </div>

          <div id="metricGrid" class="metric-grid"></div>

          <div class="chart-card">
            <canvas id="detailCanvas" width="432" height="160"></canvas>
          </div>

          <div class="detail-bottom">
            <article class="detail-list-card">
              <div class="section-head">
                <h3>加分项</h3>
                <span class="tiny-meta">命中规则</span>
              </div>
              <div id="matchedRules" class="rule-items"></div>
            </article>

            <article class="detail-list-card">
              <div class="section-head">
                <h3>减分项</h3>
                <span class="tiny-meta">未命中规则</span>
              </div>
              <div id="missedRules" class="rule-items"></div>
            </article>
          </div>
        </section>
      </div>
    </main>

    <div id="searchModal" class="modal-backdrop hidden">
      <section class="modal-card">
        <div class="section-head">
          <div>
            <h2>添加自选股</h2>
            <p class="tiny-meta">输入代码、名称或拼音简写，例如 600519 / 腾讯 / rjgf</p>
          </div>
          <button id="closeSearchBtn" class="ghost-btn">关闭</button>
        </div>

        <form id="watchForm" class="watch-form">
          <input id="watchCodeInput" name="code" type="text" maxlength="20" placeholder="代码、名称或拼音简写" autocomplete="off" required>
          <input id="watchNameInput" name="name" type="text" maxlength="20" placeholder="名称可留空，优先从搜索结果选择" autocomplete="off">
          <button type="submit" class="solid-btn">添加</button>
        </form>

        <div id="searchResults" class="search-results"></div>
      </section>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
