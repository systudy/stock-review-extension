<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股每日复盘提醒</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="topbar">
        <div class="title-wrap">
          <h1>收盘复盘助手</h1>
          <p id="headerStatus" class="header-status">复盘未生成 · 自动 15:10 / 16:15</p>
        </div>
      </header>

      <div class="body-columns">
        <aside class="sidebar-panel">
          <div class="sidebar-head">
            <h2>自选股 <span id="watchCount" class="tiny-meta"></span></h2>
            <div class="watch-actions">
              <button id="refreshBtn" class="ghost-btn icon-btn" title="刷新复盘">↻</button>
              <button id="openOptionsBtn" class="ghost-btn icon-btn" title="规则设置">⚙</button>
              <button id="openDashboardBtn" class="ghost-btn icon-btn" title="完整面板">▣</button>
              <button id="openSearchBtn" class="solid-btn icon-btn" title="添加股票">＋</button>
            </div>
          </div>
          <div id="watchlistCards" class="watchlist-cards"></div>
        </aside>

        <section class="detail-panel collapsed">
          <div class="detail-inner">
            <div class="detail-head">
              <div>
                <div id="selectedTitle" class="detail-title">请选择一只股票</div>
                <p id="selectedMeta" class="detail-meta">点击左侧股票查看 K 线与评分详情</p>
              </div>
              <div id="selectedScore" class="score-pill">--</div>
            </div>
          </div>

          <div class="chart-card">
            <canvas id="detailCanvas" width="600" height="260"></canvas>
          </div>

          <div class="detail-inner">
            <div id="metricGrid" class="metric-grid"></div>

            <details class="rules-collapse">
              <summary>规则详情</summary>
              <div class="detail-bottom">
                <article class="detail-list-card">
                  <div class="section-head">
                    <h3>加分项</h3>
                    <span class="tiny-meta">命中规则</span>
                  </div>
                  <div id="matchedRules" class="rule-items"></div>
                </article>

                <article class="detail-list-card">
                  <div class="section-head">
                    <h3>减分项</h3>
                    <span class="tiny-meta">未命中规则</span>
                  </div>
                  <div id="missedRules" class="rule-items"></div>
                </article>
              </div>
            </details>
          </div>
        </section>
      </div>
    </main>

    <div id="searchModal" class="modal-backdrop hidden">
      <section class="modal-card">
        <div class="section-head">
          <div>
            <h2>添加自选股</h2>
            <p class="tiny-meta">输入代码、名称或拼音简写，例如 600519 / 腾讯 / rjgf</p>
          </div>
          <button id="closeSearchBtn" class="ghost-btn">关闭</button>
        </div>

        <form id="watchForm" class="watch-form">
          <input id="watchCodeInput" name="code" type="text" maxlength="20" placeholder="代码、名称或拼音简写" autocomplete="off" required>
          <input id="watchNameInput" name="name" type="text" maxlength="20" placeholder="名称可留空，优先从搜索结果选择" autocomplete="off">
          <button type="submit" class="solid-btn">添加</button>
        </form>

        <div id="searchResults" class="search-results"></div>
      </section>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
